name: Backend Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: backend-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Route preflight
        run: npm run preflight:routes

      - name: Security regression checks
        run: npm run check:security

      - name: Backend unit and contract tests
        run: npm run test:backend

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint
