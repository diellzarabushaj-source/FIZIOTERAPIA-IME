name: Build and deploy Sanity Studio

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "apps/studio/**"
      - ".github/workflows/deploy-sanity-studio.yml"
  push:
    branches:
      - main
    paths:
      - "apps/studio/**"
      - ".github/workflows/deploy-sanity-studio.yml"

permissions:
  contents: read

concurrency:
  group: sanity-studio-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-studio:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio
    env:
      SANITY_STUDIO_PROJECT_ID: a3wcdlcy
      SANITY_STUDIO_DATASET: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Studio dependencies
        run: npm install --no-audit --no-fund

      - name: Capture resolved Studio dependencies
        shell: bash
        run: npm ls --depth=0 --json > sanity-installed-versions.json

      - name: Upload Studio dependency resolution
        uses: actions/upload-artifact@v4
        with:
          name: sanity-studio-dependency-resolution
          path: |
            apps/studio/sanity-installed-versions.json
            apps/studio/package-lock.json
          if-no-files-found: error
          retention-days: 7

      - name: Build Studio
        id: studio-build
        shell: bash
        run: |
          set +e
          npm run build > sanity-build.log 2>&1
          status=$?
          tail -n 120 sanity-build.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload failed Studio build log
        if: steps.studio-build.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: sanity-studio-build-log
          path: apps/studio/sanity-build.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail when Studio build failed
        if: steps.studio-build.outputs.status != '0'
        run: exit 1

      - name: Verify Sanity deploy token exists
        if: github.event_name != 'pull_request'
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
        run: |
          if [ -z "$SANITY_AUTH_TOKEN" ]; then
            echo "SANITY_AUTH_TOKEN is missing. Add it in GitHub Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Deploy Studio to Sanity hosting
        if: github.event_name != 'pull_request'
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
        run: npm run deploy
