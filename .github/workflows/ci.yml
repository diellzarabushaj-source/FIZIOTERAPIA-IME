name: Launch CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: launch-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  quality:
    name: Full quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Use repository npm version
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Verify runtime and dependency policy
        run: |
          node --version
          npm --version
          node scripts/dependency-policy-check.mjs

      - name: Install dependencies
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci --no-audit --no-fund
          else
            echo "package-lock.json is being bootstrapped; using npm install for this run."
            npm install --no-audit --no-fund
          fi

      - name: Run full quality gate
        run: npm run check:all
