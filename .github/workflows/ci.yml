name: Launch CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: launch-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  quality:
    name: Full quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Use repository npm version
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Verify runtime and dependency policy
        run: |
          node --version
          npm --version
          node scripts/dependency-policy-check.mjs

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate repository rebuild inventory
        run: npm run audit:inventory

      - name: Upload repository rebuild inventory
        uses: actions/upload-artifact@v4
        with:
          name: rebuild-repository-inventory
          path: docs/rebuild/repository-inventory.generated.md
          if-no-files-found: error
          retention-days: 14

      - name: Run full quality gate
        id: full-quality
        shell: bash
        run: |
          set +e
          npm run check:all > full-quality.log 2>&1
          status=$?
          tail -n 240 full-quality.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload failed quality gate log
        if: steps.full-quality.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: full-quality-log
          path: full-quality.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail when full quality gate failed
        if: steps.full-quality.outputs.status != '0'
        run: exit 1
