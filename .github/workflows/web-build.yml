name: Web build check

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: web-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Next.js web app
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Use repository npm version
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Route file preflight
        run: npm run preflight:routes

      - name: Security regression gate
        run: npm run check:security

      - name: Clinical backend regression tests
        id: backend-tests
        shell: bash
        run: |
          set +e
          npm run test:backend > backend-tests.log 2>&1
          status=$?
          tail -n 200 backend-tests.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload failed backend test log
        if: steps.backend-tests.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-log
          path: backend-tests.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail when backend tests failed
        if: steps.backend-tests.outputs.status != '0'
        run: exit 1

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Build web app
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PATIENT_SESSION_SECRET: ${{ secrets.PATIENT_SESSION_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_REPLY_TO_EMAIL: ${{ secrets.RESEND_REPLY_TO_EMAIL }}

      - name: Mobile TypeScript check
        run: npm run mobile:typecheck
        env:
          EXPO_PUBLIC_API_BASE_URL: https://fizioterapia-ime.vercel.app
