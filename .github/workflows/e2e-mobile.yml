name: Mobile patient E2E

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: mobile-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mobile-e2e:
    name: Mobile patient safety flow
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Use repository npm version
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Install application dependencies
        run: npm ci --no-audit --no-fund

      - name: Install pinned Playwright runner
        run: npm install --no-save --package-lock=false @playwright/test@1.55.0

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run mobile E2E tests
        run: npx playwright test
        env:
          CI: '1'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PATIENT_SESSION_SECRET: ${{ secrets.PATIENT_SESSION_SECRET }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-e2e-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
