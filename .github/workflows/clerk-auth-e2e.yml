name: Clerk Authenticated E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployment URL to test"
        required: false
        default: "https://fizioterapia-ime.vercel.app"
        type: string

permissions:
  contents: read

jobs:
  authenticated-e2e:
    name: Owner and physio authenticated journeys
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
      E2E_CLERK_OWNER_EMAIL: ${{ secrets.E2E_CLERK_OWNER_EMAIL }}
      E2E_CLERK_PHYSIO_EMAIL: ${{ secrets.E2E_CLERK_PHYSIO_EMAIL }}

    steps:
      - name: Validate authenticated E2E configuration
        shell: bash
        run: |
          set -euo pipefail
          required=(
            CLERK_PUBLISHABLE_KEY
            CLERK_SECRET_KEY
            E2E_CLERK_OWNER_EMAIL
            E2E_CLERK_PHYSIO_EMAIL
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required repository secret: ${name/E2E_CLERK_/E2E_CLERK_}"
              exit 1
            fi
          done
          if [[ ! "$PLAYWRIGHT_BASE_URL" =~ ^https:// ]]; then
            echo "::error::Authenticated E2E requires an HTTPS deployment URL."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Use repository npm version
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Install application dependencies
        run: npm ci --no-audit --no-fund

      - name: Install pinned authenticated test tooling
        run: npm install --no-save --package-lock=false @playwright/test@1.55.0 @clerk/testing@1.9.2

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run authenticated Clerk journeys
        run: npm run test:e2e:clerk

      - name: Upload authenticated Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-clerk
          path: playwright-report-clerk/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload authenticated failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clerk-auth-test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
