name: Staging Backup Restore

on:
  workflow_dispatch:
  schedule:
    - cron: '41 4 1 * *'

permissions:
  contents: read

jobs:
  backup-restore:
    if: ${{ secrets.STAGING_DATABASE_URL != '' && secrets.RESTORE_TEST_DATABASE_URL != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SOURCE_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      RESTORE_DATABASE_URL: ${{ secrets.RESTORE_TEST_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Create encrypted-in-transit temporary staging dump
        run: pg_dump "$SOURCE_DATABASE_URL" --format=custom --no-owner --no-acl --file=/tmp/staging.dump
      - name: Reset isolated restore-test database
        run: |
          psql "$RESTORE_DATABASE_URL" -v ON_ERROR_STOP=1 -c "DROP SCHEMA IF EXISTS public CASCADE; CREATE SCHEMA public;"
      - name: Restore into isolated database
        run: pg_restore --dbname="$RESTORE_DATABASE_URL" --no-owner --no-acl --exit-on-error /tmp/staging.dump
      - name: Verify restored schema and synthetic records
        run: |
          psql "$RESTORE_DATABASE_URL" -v ON_ERROR_STOP=1 -f tests/security/rls-audit.sql
          psql "$RESTORE_DATABASE_URL" -v ON_ERROR_STOP=1 -c "SELECT count(*) AS restored_tables FROM information_schema.tables WHERE table_schema='public';"
      - name: Delete temporary dump
        if: always()
        run: rm -f /tmp/staging.dump
