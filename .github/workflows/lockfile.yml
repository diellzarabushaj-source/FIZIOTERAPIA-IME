name: npm Lockfile Guard

on:
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .npmrc
      - .nvmrc
      - .github/workflows/lockfile.yml
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .npmrc
      - .nvmrc
      - .github/workflows/lockfile.yml

permissions:
  contents: write

concurrency:
  group: npm-lockfile-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  lockfile:
    name: Generate and verify package-lock.json
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Use repository npm version
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Generate deterministic lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Verify dependency policy and lockfile
        run: REQUIRE_PACKAGE_LOCK=1 node scripts/dependency-policy-check.mjs

      - name: Commit lockfile on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Generate deterministic npm lockfile"
          git push origin HEAD:main

      - name: Verify pull request lockfile is current
        if: github.event_name == 'pull_request'
        run: git diff --exit-code -- package-lock.json
