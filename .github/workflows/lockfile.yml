name: npm Lockfile Guard

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .npmrc
      - .nvmrc
      - .github/workflows/lockfile.yml
  push:
    branches:
      - "**"
    paths:
      - package.json
      - package-lock.json
      - .npmrc
      - .nvmrc
      - .github/workflows/lockfile.yml

permissions:
  contents: write

concurrency:
  group: npm-lockfile-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  lockfile:
    name: Generate and verify package-lock.json
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Use repository npm version
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Generate deterministic lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Verify dependency policy and lockfile
        run: REQUIRE_PACKAGE_LOCK=1 node scripts/dependency-policy-check.mjs

      - name: Commit generated lockfile to writable branches
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- package-lock.json)" ]; then
            echo "package-lock.json is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: generate deterministic npm lockfile"
          git push origin "HEAD:${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"

      - name: Verify fork pull request lockfile is current
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        shell: bash
        run: |
          if [ -n "$(git status --porcelain -- package-lock.json)" ]; then
            echo "package-lock.json is missing or stale."
            git status --short -- package-lock.json
            exit 1
          fi
